version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./engine:/engine
      - ./shared:/shared
      - cv_flow_storage:/app/storage
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/storage/cv_flow.db
      - STORAGE_PATH=/app/storage
      - ENGINE_WS_PORT=8765
      - ENGINE_PYTHON=python3
      - CORS_ORIGINS=http://localhost:5173
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host 0.0.0.0

volumes:
  cv_flow_storage:
